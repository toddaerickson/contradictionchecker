# consistency-checker configuration
#
# Copy this file (e.g. to `config.yml`) and adjust per environment. The only
# required field is `corpus_dir`. Every other field has a sensible default.
#
# Environment variables override yaml values when prefixed with `CC_`, e.g.
# `CC_NLI_CONTRADICTION_THRESHOLD=0.6`.

# Required — directory to ingest documents from.
corpus_dir: ./corpus

# Stage B judge — see docs/decisions/0001-llm-judge-provider.md
# One of: anthropic | openai | fixture
judge_provider: anthropic
judge_model: claude-sonnet-4-6

# Storage — SQLite (canonical) and FAISS (derived) live under data_dir
data_dir: ./data/store
log_dir: ./data/logs

# Pairwise contradiction detector — see docs/decisions/0015-pairwise-opt-in.md
# Off by default: own-corpus eval on legal prose showed near-zero useful yield
# at high compute cost (~800 MB NLI download, ~600 MB RSS). Set to true on
# numeric- or spec-heavy corpora, or pass --pairwise per run.
pairwise_enabled: false

# Stage A NLI — see docs/decisions/0002-embedding-model.md for embedder choice
# (NLI model only loaded when pairwise_enabled is true)
embedder_model: sentence-transformers/all-mpnet-base-v2
nli_model: MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli
nli_contradiction_threshold: 0.5

# Candidate-pair gate
gate_top_k: 20
gate_similarity_threshold: 0.7

# Chunking — used by corpus/chunker.py
chunk_max_chars: 1000
chunk_overlap_chars: 0

# Optional memory guardrail. When set, `consistency-check check --pairwise`
# aborts before loading the NLI model if MemAvailable is below this threshold.
# Skipped entirely when pairwise is off (the dominant memory consumer doesn't
# load). See CORPORATE_SETUP.md §4.5. Leave unset to skip the pre-flight.
# max_memory_mb: 3000

# Optional hard ceiling on estimated spend (USD). When set, `check` runs the
# cost estimate as a pre-flight and aborts before NLI/judge bootstrap if the
# conservative projection exceeds this value. The CLI flag `--max-cost <USD>`
# overrides per run. Comment out or set to null to disable. See ADR-0016.
# max_cost_usd: 5.00
