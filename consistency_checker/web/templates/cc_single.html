<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>contradiction-checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/cc_style.css">
    <link rel="stylesheet" href="/static/cc_collapsed.css">
    <script src="/static/htmx.min.js" defer></script>
    <script src="/static/htmx-sse.min.js" defer></script>
  </head>
  <body class="cc-collapsed-body">
    <header class="cc-header cc-collapsed-header">
      <h1 class="cc-header__title">contradiction-checker</h1>
      <div class="cc-cost-gauge" id="cc-cost-gauge"
           hx-ext="sse"
           {% if active_corpus_id %}sse-connect="/corpora/{{ active_corpus_id }}/progress"{% endif %}
           sse-swap="cost_update"
           hx-target="this"
           hx-swap="innerHTML"
           title="Estimated cost (upper bound) for the active corpus's most recent run.">
        {% include "cc__cost_gauge.html" %}
      </div>
      <button type="button" class="cc-settings-cog" disabled
              aria-label="Settings (unavailable)"
              title="Settings drawer — out of scope for ADR-0017"><span aria-hidden="true">⚙</span></button>
    </header>
    <div class="cc-shell">
      <aside class="cc-sidebar" id="cc-sidebar"
             hx-get="/corpora/sidebar"
             hx-trigger="corpus-created from:body"
             hx-swap="innerHTML">
        {% include "cc_sidebar.html" %}
      </aside>
      <main class="cc-main" id="cc-main">
        {% include "cc_findings.html" %}
      </main>
    </div>
    <div id="cc-modal-region"></div>
    <div id="cc-drawer-region" class="cc-drawer-region" hidden></div>
    <dialog id="cc-diff-dialog" class="cc-dialog">
      <div id="cc-diff-content"></div>
      <button type="button" class="cc-button" onclick="document.getElementById('cc-diff-dialog').close()">Close</button>
    </dialog>
    <div id="cc-toast-region" class="cc-toast-region" role="status" aria-live="polite"></div>
    <script>
    // Modal manager: the modal partials are swapped into #cc-modal-region as
    // <dialog> (no `open`); promote to a real modal via showModal() so the UA
    // gives us a focus trap, Esc, and a backdrop. Restore focus to the opener.
    (function () {
      var region = document.getElementById('cc-modal-region');
      if (!region) return;
      var trigger = null;
      document.addEventListener('click', function (e) {
        var t = e.target.closest && e.target.closest('[hx-get]');
        if (t && /\/modal$/.test(t.getAttribute('hx-get') || '')) trigger = t;
      }, true);
      function closeModal() {
        var dlg = region.querySelector('dialog');
        if (dlg && dlg.open) { try { dlg.close(); } catch (_) {} }
        region.innerHTML = '';
        if (trigger && trigger.focus) trigger.focus();
        trigger = null;
      }
      window.__ccCloseModal = closeModal;
      document.body.addEventListener('htmx:afterSwap', function (e) {
        if (!e.target || e.target.id !== 'cc-modal-region') return;
        var dlg = region.querySelector('dialog.cc-modal');
        if (!dlg) return;
        if (!dlg.open) { try { dlg.showModal(); } catch (_) {} }
        dlg.addEventListener('cancel', function (ev) { ev.preventDefault(); closeModal(); });
        var first = dlg.querySelector('[autofocus]')
          || dlg.querySelector('input, select, textarea, button, [href]');
        if (first) first.focus();
      });
    })();
    </script>
    <script>
    // Keyboard triage for the findings list (survives HTMX swaps — document-level).
    // j/k move focus between finding cards; c/f/d set the focused card's verdict
    // (the buttons advertise these keys). Ignored while typing in a field.
    (function () {
      function cards() { return Array.prototype.slice.call(document.querySelectorAll('.cc-finding')); }
      function overlayOpen() {
        var modal = document.getElementById('cc-modal-region');
        var drawer = document.getElementById('cc-drawer-region');
        var diff = document.getElementById('cc-diff-dialog');
        return (modal && modal.children.length > 0)
          || (drawer && !drawer.hidden)
          || (diff && diff.open);
      }
      document.addEventListener('keydown', function (e) {
        var t = e.target;
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        if (t && (t.matches('input, textarea, select') || t.isContentEditable)) return;
        // Don't steal keys while a modal / drawer / diff dialog is open.
        if (overlayOpen()) return;
        var list = cards();
        if (!list.length) return;
        var cur = t && t.closest ? t.closest('.cc-finding') : null;
        var idx = cur ? list.indexOf(cur) : -1;
        if (e.key === 'j' || e.key === 'k') {
          e.preventDefault();
          var to = e.key === 'j' ? Math.min(list.length - 1, idx + 1) : Math.max(0, (idx < 0 ? 0 : idx) - 1);
          if (idx < 0) to = 0;
          list[to].focus();
          list[to].scrollIntoView({ block: 'nearest' });
        } else if (cur && (e.key === 'c' || e.key === 'f' || e.key === 'd')) {
          var map = { c: 'confirmed', f: 'false_positive', d: 'dismissed' };
          var btn = cur.querySelector('[data-verdict="' + map[e.key] + '"]');
          if (btn) { e.preventDefault(); btn.click(); }
        }
      });
    })();
    </script>
  </body>
</html>
