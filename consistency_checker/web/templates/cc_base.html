<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>consistency-checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/cc_style.css">
    <script src="/static/htmx.min.js" defer></script>
  </head>
  <body>
    <header class="cc-header">
      <h1 class="cc-header__title">contradiction-checker</h1>
      <nav class="cc-tabs">
        <a class="cc-tab {% if active_tab == 'ingest' %}cc-tab--active{% endif %}" hx-get="/tabs/ingest" hx-target="#cc-tab-content" hx-push-url="true"><span class="cc-tab-number">01</span> Ingest</a>
        <a class="cc-tab {% if active_tab == 'process' %}cc-tab--active{% endif %}" hx-get="/tabs/process" hx-target="#cc-tab-content" hx-push-url="true"><span class="cc-tab-number">02</span> Process</a>
        <a class="cc-tab {% if active_tab == 'assertions' %}cc-tab--active{% endif %}" hx-get="/tabs/assertions" hx-target="#cc-tab-content" hx-push-url="true"><span class="cc-tab-number">03</span> Assertions</a>
        <a class="cc-tab {% if active_tab == 'contradictions' %}cc-tab--active{% endif %}" hx-get="/" hx-target="#cc-tab-content" hx-push-url="true"><span class="cc-tab-number">04</span> Contradictions</a>
        <a class="cc-tab {% if active_tab == 'definitions' %}cc-tab--active{% endif %}" hx-get="/tabs/definitions" hx-target="#cc-tab-content" hx-push-url="true"><span class="cc-tab-number">05</span> Definitions</a>
        <a class="cc-tab {% if active_tab == 'action_items' %}cc-tab--active{% endif %}" hx-get="/tabs/action_items" hx-target="#cc-tab-content" hx-push-url="true"><span class="cc-tab-number">06</span> Action Items</a>
        <a class="cc-tab {% if active_tab == 'stats' %}cc-tab--active{% endif %}" hx-get="/tabs/stats" hx-target="#cc-tab-content" hx-push-url="true"><span class="cc-tab-number">07</span> Stats</a>
      </nav>
    </header>
    <main id="cc-tab-content">
      {% block content %}{% endblock %}
    </main>
    <dialog id="cc-diff-dialog" class="cc-dialog">
      <div id="cc-diff-content"></div>
      <button type="button" class="cc-button" onclick="document.getElementById('cc-diff-dialog').close()">Close</button>
    </dialog>
    <div id="cc-toast-region" class="cc-toast-region" role="status" aria-live="polite"></div>
    <script>
      document.addEventListener('keydown', (e) => {
        const row = document.activeElement.closest('tr.cc-finding-row');
        if (!row) return;
        const verdictMap = { 'c': 'confirmed', 'f': 'false_positive', 'd': 'dismissed' };
        const verdict = verdictMap[e.key.toLowerCase()];
        if (!verdict) return;
        const btn = row.querySelector('[data-verdict="' + verdict + '"]');
        if (btn) { e.preventDefault(); btn.click(); }
      });

      document.body.addEventListener('htmx:afterSwap', (e) => {
        if (!e.detail.target || !e.detail.target.classList) return;
        const tbody = e.detail.target.closest('tbody');
        if (!tbody) return;
        const nextRow = tbody.querySelector('tr.cc-finding-row');
        if (nextRow) nextRow.focus();
      });

      // Tab-nav active state: HTMX swaps only #cc-tab-content, so the .cc-tab--active
      // class on the header anchors doesn't auto-update. Move it on every tab click.
      const ccTabsNav = document.querySelector('.cc-tabs');
      if (ccTabsNav) {
        ccTabsNav.addEventListener('click', (e) => {
          const tab = e.target.closest('.cc-tab');
          if (!tab) return;
          document.querySelectorAll('.cc-tab').forEach(t => t.classList.remove('cc-tab--active'));
          tab.classList.add('cc-tab--active');
        });
      }
    </script>
  </body>
</html>
